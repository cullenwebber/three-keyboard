<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Keycap Sketch</title>
	</head>
	<body>
		<div id="app" class="h-lvh w-full relative">
			<div class="top-4 left-4 text-white z-50 absolute max-w-[50%]">
				Move browser window or tilt device to move keys
			</div>
			<button
				data-reset-button
				class="text-white z-50 absolute top-4 right-4 cursor-pointer underline"
			>
				Reset
			</button>
			<button
				data-start-overlay
				hidden
				class="hidden fixed inset-0 z-[60] w-full h-full bg-black/50 text-white text-xl items-center justify-center cursor-pointer"
			>
				Tap to start
			</button>
		</div>
		<script type="module" src="/src/main.js"></script>
	</body>
</html>
